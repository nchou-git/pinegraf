<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinegraf</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: light; --accent: #00693e; --accent-dark: #00543a; --bg: #f7faf8; --border: #d8e2dd; --muted: #5e6d66; --panel: #ffffff; --text: #10221a; }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .shell { width: min(100%, 1080px); margin: 0 auto; padding: 36px 24px 56px; }
      .app-header { margin-bottom: 26px; display: flex; align-items: center; justify-content: space-between; }
      .brand-row { display: flex; align-items: baseline; gap: 12px; }
      .pine-logo { width: 44px; height: 48px; align-self: flex-end; }
      h1, h2, p { margin: 0; }
      h1 { font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1; }
      h2 { font-size: 1.28rem; }
      .tagline { margin-top: 10px; color: var(--muted); font-size: 1.08rem; }
      .admin-link { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
      .admin-link:hover { color: var(--accent); }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 16px 36px rgba(16, 34, 26, 0.08); padding: 24px; }
      .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
      .tab { appearance: none; background: none; border: none; border-bottom: 3px solid transparent; color: var(--muted); cursor: pointer; font: inherit; font-weight: 700; padding: 12px 18px; margin-bottom: -1px; }
      .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
      .panel[hidden] { display: none; }
      input[type="text"] { width: 100%; min-height: 42px; border: 1px solid #b8c8c0; border-radius: 8px; font: inherit; padding: 0 14px; }
      input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 105, 62, 0.15); outline: none; }
      button.primary { appearance: none; background: var(--accent); border: 1px solid transparent; border-radius: 8px; color: #fff; cursor: pointer; font: inherit; font-weight: 750; min-height: 42px; padding: 0 18px; }
      button.primary:not(:disabled):hover { background: var(--accent-dark); }
      .lookup-grid { display: grid; grid-template-columns: 1fr 1fr 160px auto; gap: 12px; }
      @media (max-width: 760px) { .lookup-grid { grid-template-columns: 1fr; } }
      .results { margin-top: 18px; display: grid; gap: 12px; }
      .result-row { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; background: #f8fbf9; }
      .result-row .name { font-weight: 800; }
      .result-row .meta { color: var(--muted); font-size: 0.92rem; margin-top: 4px; }
      .result-row .role { margin-top: 6px; }
      .research-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; }
      @media (max-width: 760px) { .research-row { grid-template-columns: 1fr; } }
      .mode-toggle { display: inline-grid; grid-template-columns: 1fr 1fr; border: 1px solid #b8c8c0; border-radius: 8px; overflow: hidden; min-height: 42px; }
      .mode-toggle label { display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800; padding: 0 12px; }
      .mode-toggle input { appearance: none; position: absolute; }
      .mode-toggle label:has(input:checked) { background: var(--accent); color: #fff; }
      #answer { margin-top: 16px; min-height: 56px; padding: 16px; border: 1px solid var(--border); border-radius: 8px; background: #f8fbf9; white-space: pre-wrap; }
      .empty { color: var(--muted); font-style: italic; }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div class="brand-row">
          <svg class="pine-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <polygon points="24 4 12 20 36 20" fill="#00693e" />
            <polygon points="24 14 8 32 40 32" fill="#00693e" />
            <polygon points="24 25 6 42 42 42" fill="#00693e" />
            <rect x="21" y="39" width="6" height="7" rx="1" fill="#00693e" />
          </svg>
          <div><h1>Pinegraf</h1><p class="tagline">Where alumni stories connect.</p></div>
        </div>
        <a class="admin-link" href="/admin">admin</a>
      </header>
      <section class="card">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="lookup">Lookup</button>
          <button class="tab" data-tab="research">Research</button>
        </div>
        <div class="panel" id="panel-lookup">
          <h2>Lookup</h2>
          <p class="tagline" style="margin-bottom: 16px;">Filter the structured database. No AI &mdash; exact field matches.</p>
          <div class="lookup-grid">
            <input id="lk-name" type="text" placeholder="Name" />
            <input id="lk-company" type="text" placeholder="Company" />
            <input id="lk-year" type="text" placeholder="Class year (T'24)" />
            <button id="lk-go" class="primary" type="button">Search</button>
          </div>
          <div id="lk-results" class="results"></div>
        </div>
        <div class="panel" id="panel-research" hidden>
          <h2>Research</h2>
          <p class="tagline" style="margin-bottom: 16px;">Ask in natural language. AI reasons over the crawled corpus.</p>
          <div class="research-row">
            <input id="rs-question" type="text" placeholder="Who worked on gyrobike?" />
            <button id="rs-go" class="primary" type="button">Ask</button>
          </div>
          <div id="answer">Answer will appear here.</div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
