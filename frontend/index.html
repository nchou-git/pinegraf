<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinegraf</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div class="brand-row">
          <svg class="pine-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <polygon points="24 4 12 20 36 20" fill="#00693e" />
            <polygon points="24 14 8 32 40 32" fill="#00693e" />
            <polygon points="24 25 6 42 42 42" fill="#00693e" />
            <rect x="21" y="39" width="6" height="7" rx="1" fill="#00693e" />
          </svg>
          <div class="brand-text">
            <h1>Pinegraf</h1>
            <p class="tagline">Where alumni stories connect.</p>
          </div>
        </div>
        <a class="nav-link" href="/admin">admin</a>
      </header>

      <section class="card">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="lookup">Lookup</button>
          <button class="tab" data-tab="research">Research</button>
          <button class="tab" data-tab="connections">Connections</button>
        </div>

        <div class="panel" id="panel-lookup">
          <h2>Lookup</h2>
          <p class="tagline" style="margin-bottom: 16px;">
            Filter the structured database. No AI &mdash; exact field matches.
          </p>
          <div class="lookup-grid">
            <input id="lk-name" type="text" placeholder="Name" />
            <input id="lk-company" type="text" placeholder="Company" />
            <input id="lk-year" type="text" placeholder="Class year (T'24)" />
            <button id="lk-go" class="primary" type="button">Search</button>
          </div>
          <div id="lk-results" class="results"></div>
        </div>

        <div class="panel" id="panel-research" hidden>
          <h2>Research</h2>
          <p class="tagline" style="margin-bottom: 16px;">
            Ask in natural language. AI reasons over the crawled corpus.
          </p>
          <div class="research-row">
            <input id="rs-question" type="text" placeholder="Who worked on gyrobike?" />
            <button id="rs-go" class="primary" type="button">Ask</button>
          </div>
          <div id="answer">Answer will appear here.</div>
        </div>

        <div class="panel" id="panel-connections" hidden>
          <h2>Connections</h2>
          <div class="research-row">
            <input id="cn-name" type="text" placeholder="Entity name" />
            <button id="cn-go" class="primary" type="button">Search</button>
          </div>
          <div id="cn-results" class="results"></div>
          <div id="cn-detail" class="entity-detail"></div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
