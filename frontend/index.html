<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pinegraf</title>
    <link rel="icon" href="/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="/styles.css?v=bulk-source-depth" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"
      defer
    ></script>
    <script src="/app.js?v=bulk-source-depth" defer></script>
  </head>
  <body data-workspace="tuck">
    <div class="app-shell" id="shell">
      <aside class="sidebar" id="sidebar">
        <a class="sidebar-header" href="#ask" aria-label="Go to Ask">
          <svg
            width="24"
            height="24"
            viewBox="0 0 40 40"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <polygon
              points="20,4 12,14 16,14 9,22 14,22 6,32 34,32 26,22 31,22 24,14 28,14"
              fill="currentColor"
            />
            <rect x="18" y="32" width="4" height="4" fill="currentColor" />
          </svg>
          <span class="sidebar-header-copy">
            <span class="wordmark">Pinegraf</span>
          </span>
        </a>
        <nav class="sidebar-nav" id="sidebar-nav" aria-label="Primary"></nav>
        <div class="sidebar-footer">
          <button class="btn-ghost sidebar-org-row" id="sidebar-org-row" type="button" aria-label="Workspace menu">
            <span class="avatar-circle" id="sidebar-org-avatar">TS</span>
            <span class="sidebar-org-copy">
              <span class="sidebar-org-name" id="sidebar-org-name">Viewer</span>
              <span class="sidebar-org-role" id="sidebar-org-role">Tuck School of Business</span>
            </span>
            <i class="ti ti-chevron-up sidebar-org-chevron" aria-hidden="true"></i>
          </button>
          <button class="btn-icon-only sidebar-collapse" id="sidebar-collapse" type="button" aria-label="Collapse sidebar">
            <i class="ti ti-chevron-left" aria-hidden="true"></i>
          </button>
        </div>
      </aside>
      <div class="mobile-sidebar-backdrop" id="mobile-sidebar-backdrop"></div>
      <main class="main-pane">
        <button class="btn-icon-only mobile-menu-button" id="mobile-menu-button" type="button" aria-label="Open navigation">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
        <header class="page-header-strip" id="page-header"></header>
        <section id="app" class="content-container"></section>
      </main>
    </div>
    <div id="modal-root"></div>
  </body>
</html>
