<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinegraf</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: light;
        --accent: #4f46e5;
        --accent-dark: #4338ca;
        --bg: #f8fafc;
        --border: #e2e8f0;
        --muted: #64748b;
        --panel: #ffffff;
        --text: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .shell {
        width: min(100%, 1040px);
        margin: 0 auto;
        padding: 40px 24px 56px;
      }

      .app-header {
        margin-bottom: 28px;
      }

      .brand-row {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }

      .pine-logo {
        display: block;
        flex: 0 0 auto;
        width: 44px;
        height: 48px;
        align-self: flex-end;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        line-height: 1;
        letter-spacing: 0;
      }

      h2 {
        font-size: 1.35rem;
        line-height: 1.25;
      }

      h3 {
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .tagline {
        margin-top: 10px;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      .progress-card {
        padding: 24px;
      }

      .section-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .queue-count {
        margin-top: 12px;
        color: var(--accent);
        font-size: clamp(1.35rem, 4vw, 2rem);
        font-weight: 800;
        letter-spacing: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 0 18px;
        transition:
          background-color 0.16s ease,
          border-color 0.16s ease,
          color 0.16s ease,
          transform 0.16s ease,
          box-shadow 0.16s ease;
      }

      button:not(:disabled):hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .button-primary {
        background: var(--accent);
        color: #ffffff;
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.22);
      }

      .button-primary:not(:disabled):hover {
        background: var(--accent-dark);
      }

      .button-secondary {
        background: #ffffff;
        border-color: #cbd5e1;
        color: #334155;
      }

      .button-secondary:not(:disabled):hover {
        border-color: #94a3b8;
        color: #0f172a;
      }

      .progress-stack {
        display: grid;
        gap: 20px;
      }

      .progress-group {
        display: grid;
        gap: 10px;
      }

      .progress-heading {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      .meta {
        color: var(--muted);
        font-size: 0.95rem;
        overflow-wrap: anywhere;
        text-align: right;
      }

      .progress-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 52px;
        align-items: center;
        gap: 14px;
      }

      .bar {
        background: #e2e8f0;
        border-radius: 999px;
        height: 14px;
        overflow: hidden;
      }

      .bar > div {
        background: var(--accent);
        border-radius: inherit;
        height: 100%;
        width: 0%;
        transition: width 0.35s ease;
      }

      .percent {
        color: #334155;
        font-variant-numeric: tabular-nums;
        font-weight: 800;
        text-align: right;
      }

      .summary-card {
        margin-top: 18px;
        padding: 18px 20px;
        border-color: #c7d2fe;
        background: #eef2ff;
        color: #312e81;
        font-weight: 800;
      }

      .summary-card[hidden] {
        display: none;
      }

      #log {
        margin-top: 24px;
        padding: 16px;
        border-radius: 8px;
        height: 260px;
        overflow-y: auto;
        background: #0f172a;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
        font-size: 0.86rem;
        line-height: 1.55;
      }

      #log:empty::before {
        color: #94a3b8;
        content: "Logs will appear here.";
      }

      #log div {
        padding: 1px 0;
      }

      .stage {
        color: #cbd5e1;
      }

      .alum-done {
        color: #86efac;
      }

      .class-start,
      .class-done {
        color: #93c5fd;
        font-weight: 700;
      }

      .error {
        color: #fca5a5;
      }

      .ask-card {
        margin-top: 28px;
        padding: 24px;
      }

      .query-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        margin-top: 16px;
      }

      input[type="text"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        color: var(--text);
        font: inherit;
        padding: 0 14px;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.16);
        outline: none;
      }

      #answer {
        margin-top: 16px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #f8fafc;
        white-space: pre-wrap;
      }

      @media (max-width: 720px) {
        .shell {
          padding: 28px 16px 40px;
        }

        .section-top,
        .progress-heading {
          display: grid;
        }

        .actions {
          justify-content: stretch;
        }

        .actions button {
          flex: 1 1 140px;
        }

        .meta {
          text-align: left;
        }

        .query-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div class="brand-row">
          <svg
            class="pine-logo"
            role="img"
            aria-label="Pinegraf logo"
            viewBox="0 0 48 48"
            xmlns="http://www.w3.org/2000/svg"
          >
            <polygon points="24 4 12 20 36 20" fill="#00693e" />
            <polygon points="24 14 8 32 40 32" fill="#00693e" />
            <polygon points="24 25 6 42 42 42" fill="#00693e" />
            <rect x="21" y="39" width="6" height="7" rx="1" fill="#00693e" />
          </svg>
          <h1>Pinegraf</h1>
        </div>
        <p class="tagline">Where alumni stories connect.</p>
      </header>

      <section class="card progress-card" aria-labelledby="researchHeading">
        <div class="section-top">
          <div>
            <h2 id="researchHeading">Research</h2>
            <p id="queueCount" class="queue-count">Loading alumni queue...</p>
          </div>
          <div class="actions" aria-label="Research controls">
            <button id="researchBtn" class="button-primary" type="button" disabled>
              Start Research
            </button>
            <button id="stopBtn" class="button-secondary" type="button" disabled>Stop</button>
          </div>
        </div>

        <div class="progress-stack">
          <section class="progress-group" aria-label="Overall progress">
            <div class="progress-heading">
              <h3>Overall</h3>
              <div class="meta" id="overallMeta">Idle</div>
            </div>
            <div class="progress-row">
              <div class="bar"><div id="overallBar"></div></div>
              <div id="overallPct" class="percent">0%</div>
            </div>
          </section>

          <section class="progress-group" aria-label="Current class progress">
            <div class="progress-heading">
              <h3>Current Class</h3>
              <div class="meta" id="classMeta">Current class: none</div>
            </div>
            <div class="progress-row">
              <div class="bar"><div id="classBar"></div></div>
              <div id="classPct" class="percent">0%</div>
            </div>
          </section>

          <section class="progress-group" aria-label="Current alum progress">
            <div class="progress-heading">
              <h3>Current Alum</h3>
              <div class="meta" id="alumMeta">Current alum: none</div>
            </div>
            <div class="progress-row">
              <div class="bar"><div id="alumBar"></div></div>
              <div id="alumPct" class="percent">0%</div>
            </div>
          </section>
        </div>

        <div id="summaryCard" class="card summary-card" hidden></div>
        <div id="log"></div>
      </section>

      <section class="card ask-card" aria-labelledby="askHeading">
        <h2 id="askHeading">Ask</h2>
        <div class="query-row">
          <input id="question" type="text" placeholder="Who worked on the gyrobike project?" />
          <button id="queryBtn" class="button-primary" type="button">Ask</button>
        </div>
        <div id="answer">Answer will appear here.</div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
