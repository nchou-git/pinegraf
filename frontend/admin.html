<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinegraf admin</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div class="brand-row">
          <svg class="pine-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <polygon points="24 4 12 20 36 20" fill="#00693e" />
            <polygon points="24 14 8 32 40 32" fill="#00693e" />
            <polygon points="24 25 6 42 42 42" fill="#00693e" />
            <rect x="21" y="39" width="6" height="7" rx="1" fill="#00693e" />
          </svg>
          <div class="brand-text">
            <h1>Pinegraf admin</h1>
            <p class="tagline">Where alumni stories connect.</p>
          </div>
        </div>
        <a class="nav-link" href="/">&larr; back to site</a>
      </header>

      <section id="login-card" class="card" hidden>
        <div class="tabs" role="tablist">
          <button class="tab active" type="button">Sign in</button>
        </div>
        <div class="panel">
          <h2>Sign in</h2>
          <p class="tagline" style="margin-bottom: 16px;">Enter the admin password.</p>
          <div class="login-row">
            <input id="pw" type="password" placeholder="Password" />
            <button id="login-btn" class="primary" type="button">Sign in</button>
          </div>
          <div id="login-err" class="err"></div>
        </div>
      </section>

      <section id="admin-card" class="card" hidden>
        <div class="tabs" role="tablist">
          <button class="tab active" type="button">Pipeline</button>
        </div>
        <div class="panel">
          <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;">
            <h2>Pipeline</h2>
            <button id="logout-btn" class="secondary" type="button">Sign out</button>
          </div>
          <p class="tagline" style="margin-bottom: 16px;">Run the crawl and parse stages. Watch live progress.</p>
          <div class="resource-strip" aria-live="polite">
            <div>
              <div class="resource-label">Resources</div>
              <div id="usage-total" class="resource-value">0 calls | $0.0000</div>
            </div>
            <div id="usage-models" class="resource-models"></div>
          </div>
          <form id="parse-filter-form" class="parse-filter">
            <input id="parse-url-pattern" type="text" placeholder="URL regex" />
            <input id="parse-keywords" type="text" placeholder="keywords, comma separated" />
            <input id="parse-limit" type="number" min="1" step="1" placeholder="limit" />
          </form>
          <div class="actions">
            <button id="crawl-btn" class="primary" type="button">Crawl</button>
            <button id="preview-btn" class="secondary" type="button">Preview</button>
            <button id="parse-btn" class="primary" type="button">Parse</button>
            <button id="stop-btn" class="secondary" type="button" disabled>Stop</button>
          </div>
          <div id="preview-result" class="preview-result" hidden></div>
          <div id="progress-wrap" hidden>
            <div class="progress-meta">
              <span id="progress-label">Idle</span>
              <span id="progress-count">0 / 0</span>
            </div>
            <div class="progress-track">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div id="progress-usage" class="progress-usage"></div>
          </div>
          <div id="log"></div>
        </div>
      </section>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
