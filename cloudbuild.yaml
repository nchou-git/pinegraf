substitutions:
  _SERVICE: pinegraf
  _IMAGE_REPO: us-east4-docker.pkg.dev/pinegraf-prod/pinegraf/app
  _ENVIRONMENT: prod
  _MIN_INSTANCES: "1"
  _MAX_INSTANCES: "4"
  _SECRET_DATABASE_URL: DATABASE_URL
  _SECRET_OPENAI: OPENAI_API_KEY
  _SECRET_PDL: PDL_API_KEY
  _SECRET_SESSION: ADMIN_SESSION_SECRET
  _SECRET_ADMIN_PASSWORD: PINEGRAF_ADMIN_PASSWORD
  _SECRET_DB_PASSWORD: DB_PASSWORD
  _SECRET_BASIC_AUTH: ""

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_IMAGE_REPO}:${_ENVIRONMENT}-$BUILD_ID
      - -t
      - ${_IMAGE_REPO}:latest-${_ENVIRONMENT}
      - .
  - name: "gcr.io/cloud-builders/docker"
    id: "start-test-postgres"
    args:
      - run
      - -d
      - --name=pinegraf-test-postgres
      - --network=cloudbuild
      - -e
      - POSTGRES_USER=pinegraf_test
      - -e
      - POSTGRES_PASSWORD=pinegraf_test
      - -e
      - POSTGRES_DB=pinegraf_test
      - pgvector/pgvector:pg16
  - name: "gcr.io/cloud-builders/docker"
    id: "wait-test-postgres"
    entrypoint: bash
    args:
      - -c
      - |
        for _ in {1..30}; do
          if docker exec pinegraf-test-postgres pg_isready -U pinegraf_test -d pinegraf_test; then
            exit 0
          fi
          sleep 1
        done
        docker logs pinegraf-test-postgres
        exit 1
  - name: "python:3.11-slim"
    id: "pytest"
    env:
      - TEST_DATABASE_URL=postgresql+psycopg://pinegraf_test:pinegraf_test@pinegraf-test-postgres:5432/pinegraf_test
      - DATABASE_URL=postgresql+psycopg://pinegraf_test:pinegraf_test@pinegraf-test-postgres:5432/pinegraf_test
      - PINEGRAF_ADMIN_PASSWORD=test-admin-password
      - ADMIN_SESSION_SECRET=test-session-secret
      - USE_MOCK_EMBEDDINGS=true
      - PINEGRAF_TEST_DATABASE_ALLOWED_HOSTS=pinegraf-test-postgres
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir -e .
        python -m alembic upgrade head
        pytest -q
  - name: "gcr.io/cloud-builders/docker"
    args: [push, ${_IMAGE_REPO}:${_ENVIRONMENT}-$BUILD_ID]
  - name: "gcr.io/cloud-builders/docker"
    args: [push, ${_IMAGE_REPO}:latest-${_ENVIRONMENT}]
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        secrets="OPENAI_API_KEY=${_SECRET_OPENAI}:latest,PINEGRAF_ADMIN_PASSWORD=${_SECRET_ADMIN_PASSWORD}:latest,ADMIN_SESSION_SECRET=${_SECRET_SESSION}:latest,DATABASE_URL=${_SECRET_DATABASE_URL}:latest,DB_PASSWORD=${_SECRET_DB_PASSWORD}:latest"
        if gcloud secrets describe ${_SECRET_PDL} --project=pinegraf-prod >/dev/null 2>&1; then
          secrets="$${secrets},PDL_API_KEY=${_SECRET_PDL}:latest"
        fi
        if [[ -n "${_SECRET_BASIC_AUTH}" ]]; then
          secrets="$${secrets},BASIC_AUTH_CREDENTIALS=${_SECRET_BASIC_AUTH}:latest"
        fi
        gcloud run deploy ${_SERVICE} \
          --image=${_IMAGE_REPO}:${_ENVIRONMENT}-$BUILD_ID \
          --region=us-east4 \
          --platform=managed \
          --allow-unauthenticated \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=${_MIN_INSTANCES} \
          --max-instances=${_MAX_INSTANCES} \
          --concurrency=80 \
          --timeout=300 \
          --set-env-vars=EXTRACTION_MODEL=gpt-5.5,PINEGRAF_ENV=${_ENVIRONMENT},PINEGRAF_SERVICE=${_SERVICE},PINEGRAF_REGION=us-east4 \
          --set-secrets="$${secrets}"
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE=${_SERVICE} \
        DATABASE_URL_SECRET=${_SECRET_DATABASE_URL} \
        OPENAI_API_KEY_SECRET=${_SECRET_OPENAI} \
        PDL_API_KEY_SECRET=${_SECRET_PDL} \
        PINEGRAF_ADMIN_PASSWORD_SECRET=${_SECRET_ADMIN_PASSWORD} \
        ADMIN_SESSION_SECRET_NAME=${_SECRET_SESSION} \
        ./infra/gcp/create_jobs.sh
options:
  logging: CLOUD_LOGGING_ONLY
