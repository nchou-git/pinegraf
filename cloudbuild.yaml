steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - us-east4-docker.pkg.dev/pinegraf-prod/pinegraf/app:$BUILD_ID
      - -t
      - us-east4-docker.pkg.dev/pinegraf-prod/pinegraf/app:latest
      - .
  - name: "gcr.io/cloud-builders/docker"
    id: "start-test-postgres"
    args:
      - run
      - -d
      - --name=pinegraf-test-postgres
      - --network=cloudbuild
      - -e
      - POSTGRES_USER=pinegraf_test
      - -e
      - POSTGRES_PASSWORD=pinegraf_test
      - -e
      - POSTGRES_DB=pinegraf_test
      - pgvector/pgvector:pg16
  - name: "gcr.io/cloud-builders/docker"
    id: "wait-test-postgres"
    entrypoint: bash
    args:
      - -c
      - |
        for _ in {1..30}; do
          if docker exec pinegraf-test-postgres pg_isready -U pinegraf_test -d pinegraf_test; then
            exit 0
          fi
          sleep 1
        done
        docker logs pinegraf-test-postgres
        exit 1
  - name: "python:3.11-slim"
    id: "pytest"
    env:
      - TEST_DATABASE_URL=postgresql+psycopg://pinegraf_test:pinegraf_test@pinegraf-test-postgres:5432/pinegraf_test
      - DATABASE_URL=postgresql+psycopg://pinegraf_test:pinegraf_test@pinegraf-test-postgres:5432/pinegraf_test
      - PINEGRAF_ADMIN_PASSWORD=test-admin-password
      - ADMIN_SESSION_SECRET=test-session-secret
      - OPENAI_API_KEY=test-openai-key
      - USE_MOCK_EMBEDDINGS=true
      - PINEGRAF_TEST_DATABASE_ALLOWED_HOSTS=pinegraf-test-postgres
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir -e .
        python -m alembic upgrade head
        pytest -q
  - name: "gcr.io/cloud-builders/docker"
    args: [push, us-east4-docker.pkg.dev/pinegraf-prod/pinegraf/app:$BUILD_ID]
  - name: "gcr.io/cloud-builders/docker"
    args: [push, us-east4-docker.pkg.dev/pinegraf-prod/pinegraf/app:latest]
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pinegraf
      - --image=us-east4-docker.pkg.dev/pinegraf-prod/pinegraf/app:$BUILD_ID
      - --region=us-east4
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=4
      - --concurrency=80
      - --timeout=300
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,PINEGRAF_ADMIN_PASSWORD=PINEGRAF_ADMIN_PASSWORD:latest,ADMIN_SESSION_SECRET=ADMIN_SESSION_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,DB_PASSWORD=DB_PASSWORD:latest
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args: ["infra/gcp/create_jobs.sh"]
options:
  logging: CLOUD_LOGGING_ONLY
