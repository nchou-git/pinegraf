services:
  postgres:
    image: postgres:16
    container_name: pinegraf-postgres
    environment:
      POSTGRES_DB: pinegraf
      POSTGRES_USER: pinegraf
      POSTGRES_PASSWORD: pinegraf
    ports:
      - "5432:5432"
    volumes:
      - pinegraf-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinegraf -d pinegraf"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pinegraf-postgres-data:
